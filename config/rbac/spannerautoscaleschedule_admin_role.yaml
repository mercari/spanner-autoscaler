# This rule is not used by the project spanner-autoscaler itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over spanner.mercari.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: spanner-autoscaler
    app.kubernetes.io/managed-by: kustomize
  name: spannerautoscaleschedule-admin-role
rules:
- apiGroups:
  - spanner.mercari.com
  resources:
  - spannerautoscaleschedules
  verbs:
  - '*'
- apiGroups:
  - spanner.mercari.com
  resources:
  - spannerautoscaleschedules/status
  verbs:
  - get
